name: Pylint

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint
    - name: Analysing the code with pylint
      run: |
        # Lint the library only. `benchmarking/` is ad-hoc research code
        # (missing docstrings, broad excepts that are deliberate, etc.) and
        # shouldn't gate the CI; `tests/` has its own stylistic conventions.
        pylint --output-format=colorized --rcfile=.pylintrc \
            $(git ls-files 'dire_rapids/*.py' || echo "no-python-files-yet.py")